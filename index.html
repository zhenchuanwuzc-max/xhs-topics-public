<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书选题库</title>
<style>
  :root {
    --bg: #f7f7f8; --card: #fff; --border: #ececef; --line: #f0f0f2;
    --text: #1f1f24; --dim: #8a8a93; --faint: #b8b8c0;
    --accent: #ff2e4d; --accent-soft: #ffe9ec; --accent-dark: #c1123a;
    --idea:#f5a623; --todo:#4a90e2; --shot:#9b59b6; --pub:#27ae60; --drop:#b0b0b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }

  header { position: sticky; top: 0; z-index: 50; background: rgba(247,247,248,.9);
    backdrop-filter: saturate(180%) blur(12px); border-bottom: 1px solid var(--border); padding: 14px 22px 0; }
  .htop { display: flex; align-items: center; gap: 10px; }
  h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  h1 .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .meta { color: var(--dim); font-size: 12px; }

  .btn-add { padding: 10px 20px; font-size: 14px; margin-left: auto; white-space: nowrap; }
  .btn { padding: 9px 18px; border: none; border-radius: 9px; background: var(--accent); color:#fff;
    font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn:active { transform: scale(.97); }

  .tabs { display: flex; gap: 4px; margin-top: 14px; flex-wrap: wrap; }
  .tab { padding: 8px 14px 10px; font-size: 13px; cursor: pointer; color: var(--dim);
    border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 6px; }
  .tab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab .c { font-size: 11px; background: #fff; border: 1px solid var(--border); border-radius: 999px;
    padding: 0 7px; color: var(--dim); }
  .tab.on .c { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .subbar { display: flex; align-items: center; gap: 8px; padding: 12px 22px 0; flex-wrap: wrap; }
  .chip { padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); background:#fff;
    font-size: 12px; cursor: pointer; color: var(--dim); }
  .chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .wrap { padding: 14px 22px 60px; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px;
    overflow: hidden; border: 1px solid var(--border); }
  thead th { text-align: left; font-size: 11px; color: var(--dim); font-weight: 600; letter-spacing: .3px;
    padding: 10px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; user-select: none; }
  thead th.sortable { cursor: pointer; }
  thead th.sortable:hover { color: var(--accent); }
  thead th .arr { font-size: 9px; opacity: .5; }
  thead th.act { width: 36px; }
  tbody td { padding: 11px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafafb; }

  .c-title { font-weight: 600; font-size: 13.5px; line-height: 1.4; word-break: break-word; cursor: text; border-radius: 4px; padding: 1px 3px; margin: -1px -3px; }
  .c-title:hover { background: var(--accent-soft); }
  .c-note { color: var(--dim); font-size: 12px; margin-top: 2px; line-height: 1.4; word-break: break-word; cursor: text; border-radius: 4px; padding: 1px 3px; margin-left: -3px; margin-right: -3px; }
  .c-note:hover { background: #f0f0f2; }
  .c-note.empty-note { color: var(--faint); opacity: .65; }
  .col-title { min-width: 200px; }

  .pf { font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap;
    background: var(--accent-soft); color: var(--accent-dark); font-weight: 600; }
  .pf.ins { background: #e8f0fe; color: #1c5aa5; }
  .pf.both { background: #f0e8fe; color: #7038a0; }

  .dots { display: flex; gap: 3px; }
  .dots .d { width: 11px; height: 11px; border-radius: 50%; background: #e6e6ea; cursor: pointer; transition: background .1s; }
  .dots .d.on { background: var(--accent); }
  .dots .d:hover { background: var(--accent-soft); }
  .dots .d.on:hover { background: var(--accent); }
  .total { font-weight: 700; font-size: 14px; color: var(--accent-dark); text-align: center; }
  th.num, td.num { text-align: center; white-space: nowrap; }
  /* 未打分态：圆点更淡 + 提示，区分"没打过"和"打了低分" */
  .dots.unscored .d { background: #f0f0f2; opacity: .55; }
  .dots.unscored .d:hover { background: var(--accent-soft); opacity: 1; }
  .unscored-hint { font-size: 9px; color: var(--faint); }
  .score-sub { display: flex; gap: 4px; align-items: center; justify-content: center; margin-top: 3px; min-height: 14px; }
  .ai-btn { font-size: 11px; cursor: pointer; opacity: .5; transition: opacity .1s; }
  .ai-btn:hover { opacity: 1; }
  .ai-btn.loading { opacity: 1; animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-badge { font-size: 8px; font-weight: 700; color: #7038a0; background: #f0e8fe; border-radius: 4px;
    padding: 0 4px; letter-spacing: .5px; cursor: help; }

  select.status-sel { font-size: 12px; padding: 5px 7px; border: 1px solid var(--border); border-radius: 7px;
    background:#fafafa; cursor: pointer; outline: none; }
  .del { border: none; background: none; color: var(--faint); cursor: pointer; font-size: 14px;
    padding: 4px 6px; border-radius: 6px; }
  .del:hover { background: var(--accent-soft); color: var(--accent); }

  .expand { color: var(--dim); cursor: pointer; font-size: 11px; user-select: none; white-space: nowrap; }
  .expand:hover { color: var(--accent); }
  .kw { color: var(--faint); cursor: pointer; font-size: 11px; margin-top: 3px; word-break: break-word; }
  .kw:hover { color: var(--accent); }
  .kw .kw-lbl { color: var(--dim); background: #f0f0f2; border-radius: 4px; padding: 0 5px; font-size: 10px; }
  .kw:hover .kw-lbl { color: var(--accent); background: var(--accent-soft); }
  .ext-heat { font-weight: 600; color: #1d9e75; }
  .stats-row td { background: #fafafb; padding: 4px 10px 14px; border-bottom: 1px solid var(--line); }
  .stats-inner { display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .stats-inner .lbl { font-size: 11px; color: var(--dim); align-self: center; }
  .stat-cell { text-align: center; }
  .stat-cell .k { font-size: 10px; color: var(--dim); display: block; margin-bottom: 3px; }
  .stat-cell input { width: 78px; text-align: center; font-size: 13px; padding: 5px 4px; border: 1px solid var(--border);
    border-radius: 7px; outline: none; background:#fff; -moz-appearance: textfield; }
  .stat-cell input::-webkit-outer-spin-button, .stat-cell input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .stat-cell input:focus { border-color: var(--pub); }
  .pubdate { font-size: 11px; color: var(--faint); }

  .empty { text-align: center; color: var(--dim); padding: 50px 0; font-size: 13px; opacity: .7; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background:#1f1f24;
    color:#fff; padding: 9px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .2s; z-index: 99; pointer-events: none; }
  .toast.show { opacity: 1; }
  .help { font-size: 11px; color: var(--faint); margin-top: 8px; }

  /* ---- 编辑面板（右侧滑出）---- */
  .panel-mask { position: fixed; inset: 0; background: rgba(20,20,24,.28); z-index: 100;
    opacity: 0; pointer-events: none; transition: opacity .22s; }
  .panel-mask.show { opacity: 1; pointer-events: auto; }
  .panel { position: fixed; top: 0; right: 0; height: 100%; width: 420px; max-width: 92vw;
    background: #fff; z-index: 101; box-shadow: -8px 0 32px rgba(0,0,0,.12);
    transform: translateX(100%); transition: transform .26s cubic-bezier(.32,.72,0,1);
    display: flex; flex-direction: column; }
  .panel.show { transform: translateX(0); }
  .panel-head { display: flex; align-items: center; gap: 10px; padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border); }
  .panel-head h2 { font-size: 16px; font-weight: 700; }
  .panel-head .x { margin-left: auto; border: none; background: none; font-size: 20px; color: var(--dim);
    cursor: pointer; line-height: 1; padding: 4px 8px; border-radius: 8px; }
  .panel-head .x:hover { background: var(--bg); color: var(--text); }
  .panel-body { padding: 18px 22px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .fld { display: flex; flex-direction: column; gap: 6px; }
  .fld label { font-size: 12px; color: var(--dim); font-weight: 600; }
  .fld .hint { font-size: 11px; color: var(--faint); font-weight: 400; }
  .fld input, .fld textarea, .fld select { width: 100%; padding: 11px 13px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none; background: #fff; font-family: inherit;
    color: var(--text); resize: vertical; }
  .fld input:focus, .fld textarea:focus, .fld select:focus { border-color: var(--accent); }
  .fld textarea { min-height: 80px; line-height: 1.5; }
  .panel-foot { padding: 14px 22px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .panel-foot .btn { flex: 1; padding: 11px 0; }
  .panel-foot .btn.ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .panel-foot .btn.ghost:hover { background: #ececef; }
</style>
</head>
<body>

<header>
  <div class="htop">
    <h1><span class="dot"></span>小红书选题库</h1>
    <span class="meta" id="meta">加载中…</span>
    <button class="btn btn-add" id="btnAdd">+ 新选题</button>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="subbar">
  <span style="font-size:12px;color:var(--dim);">平台</span>
  <span class="chip on" data-pf="all">全部</span>
  <span class="chip" data-pf="xhs">小红书</span>
  <span class="chip" data-pf="ins">INS</span>
  <span class="chip" data-pf="both">通用</span>
  <span style="margin-left:auto;font-size:12px;color:var(--dim);cursor:pointer;" id="btnRefreshHeat" title="抓 Google 搜索大盘热度刷新「外部热度」列（每天9点也会自动跑）">🔄 立即刷新热度</span>
</div>

<div class="wrap">
  <table>
    <thead><tr id="thead"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="help">打分：点圆点打 1-5 分（流量=会不会火 · 契合=搭不搭定位 · 变现=能不能引到产品/私域）。点列头排序。选题进「已发布」后点「展开数据」填曝光等复盘数据。<br><b>外部热度</b>=Google 搜索大盘热度(0-100，每天9点自动抓)，<b>只是参考、不进综合分</b>；它不是小红书站内数据，抓不到就空着「—」不瞎填。冷门/长尾词在 Google 上常无数据(正常)，可点选题改成更通用的「关键词」提高命中。</div>
</div>

<div class="panel-mask" id="panelMask"></div>
<aside class="panel" id="panel">
  <div class="panel-head">
    <h2 id="panelTitle">编辑选题</h2>
    <button class="x" id="panelClose" title="关闭">✕</button>
  </div>
  <div class="panel-body">
    <div class="fld">
      <label>标题</label>
      <input id="pTitle" placeholder="选题标题" autocomplete="off">
    </div>
    <div class="fld">
      <label>一句话角度 <span class="hint">（可选）</span></label>
      <textarea id="pNote" placeholder="一句话说清这条选题的角度"></textarea>
    </div>
    <div class="fld">
      <label>平台</label>
      <select id="pPlatform">
        <option value="xhs">小红书</option><option value="ins">INS</option><option value="both">通用</option>
      </select>
    </div>
    <div class="fld" id="fldKeyword">
      <label>Google 搜索关键词 <span class="hint">（空着则用标题抓热度；改成通用词命中更高）</span></label>
      <input id="pKeyword" placeholder="留空 = 用标题" autocomplete="off">
    </div>
  </div>
  <div class="panel-foot">
    <button class="btn ghost" id="panelCancel">取消</button>
    <button class="btn" id="panelSave">保存</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
const STATUSES = [
  { key: "all",       name: "全部" },
  { key: "idea",      name: "💡 灵感" },
  { key: "todo",      name: "📋 待拍" },
  { key: "shot",      name: "🎬 已拍待发" },
  { key: "published", name: "✅ 已发布" },
  { key: "dropped",   name: "🗑 弃用" },
];
const STATUS_OPTS = STATUSES.filter(s => s.key !== "all");
const PF_LABEL = { xhs: "小红书", ins: "INS", both: "通用" };
const SCORES = [
  { key: "score_heat",  label: "流量" },
  { key: "score_fit",   label: "契合" },
  { key: "score_money", label: "变现" },
];
const STAT_DEFS = [
  { key: "views", label: "曝光" }, { key: "clicks", label: "点击" },
  { key: "likes", label: "点赞" }, { key: "follows", label: "涨粉" }, { key: "comments", label: "评论" },
];

let state = { topics: [], updated: null };
let curTab = "all";
let filterPf = "all";
let sortKey = "total";   // total | created | score_heat | score_fit | score_money | title
let sortDir = -1;        // -1 降 / 1 升
let expanded = new Set();

function totalScore(t) { return (t.score_heat||0)+(t.score_fit||0)+(t.score_money||0); }
// 三项全未打分 → 综合显示"—"（不显示 0，避免被误读为"评估过得 0 分"）
function totalDisplay(t) {
  if (t.score_heat==null && t.score_fit==null && t.score_money==null)
    return '<span style="color:var(--faint)">—</span>';
  return totalScore(t);
}
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function extHeatCell(t) {
  // 外部热度=Google搜索大盘热度，抓不到就空着（"—"），绝不编造
  if (t.ext_heat == null) {
    const up = t.ext_heat_updated ? ` title="已查过但无数据 · ${t.ext_heat_updated.replace('T',' ').slice(0,16)}"` : ' title="尚未刷新"';
    return `<span style="color:var(--faint)"${up}>—</span>`;
  }
  const up = t.ext_heat_updated ? t.ext_heat_updated.replace('T',' ').slice(0,16) : '';
  return `<span class="ext-heat" title="Google搜索大盘热度(0-100) · 更新 ${up}">${t.ext_heat}</span>`;
}

async function load() {
  try {
    const r = await fetch("/topics");
    state = await r.json();
    render();
  } catch(e) { document.getElementById("meta").textContent = "连接失败：服务未启动？"; }
}

function counts() {
  const c = {};
  STATUSES.forEach(s => c[s.key] = 0);
  state.topics.forEach(t => {
    if (filterPf !== "all" && t.platform !== filterPf) return;
    c.all++; if (c[t.status] != null) c[t.status]++;
  });
  return c;
}

function render() {
  // tabs
  const c = counts();
  document.getElementById("tabs").innerHTML = STATUSES.map(s =>
    `<div class="tab ${s.key===curTab?"on":""}" data-tab="${s.key}">${s.name}<span class="c">${c[s.key]}</span></div>`
  ).join("");

  // thead
  const headCols = [
    { k:"title", label:"选题", cls:"col-title", sortable:true },
    { k:"_pf", label:"平台", sortable:false },
    ...SCORES.map(s => ({ k:s.key, label:s.label, cls:"num", sortable:true })),
    { k:"total", label:"综合", cls:"num", sortable:true },
    { k:"ext_heat", label:"外部热度", cls:"num", sortable:true },
    { k:"_status", label:"状态", sortable:false },
    { k:"_act", label:"", cls:"act", sortable:false },
  ];
  document.getElementById("thead").innerHTML = headCols.map(h => {
    const arr = (h.sortable && sortKey===h.k) ? `<span class="arr">${sortDir<0?"▼":"▲"}</span>` : "";
    return `<th class="${h.cls||""} ${h.sortable?"sortable":""}" ${h.sortable?`data-sort="${h.k}"`:""}>${h.label} ${arr}</th>`;
  }).join("");

  // rows
  let rows = state.topics.filter(t =>
    (filterPf==="all" || t.platform===filterPf) &&
    (curTab==="all" || t.status===curTab)
  );
  rows.sort((a,b) => {
    let va, vb;
    if (sortKey==="total") { va=totalScore(a); vb=totalScore(b); }
    else if (sortKey==="title") { va=a.title||""; vb=b.title||""; return va.localeCompare(vb)*sortDir; }
    else if (sortKey==="created") { va=a.created||""; vb=b.created||""; return va.localeCompare(vb)*sortDir; }
    else if (sortKey==="ext_heat") {
      // 空值(null)永远排最后，不参与升降
      va = a.ext_heat; vb = b.ext_heat;
      if (va==null && vb==null) return 0;
      if (va==null) return 1;
      if (vb==null) return -1;
      return (va-vb)*sortDir;
    }
    else { va=a[sortKey]||0; vb=b[sortKey]||0; }
    return (va-vb)*sortDir;
  });

  const tbody = document.getElementById("tbody");
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty">这里还没有选题${curTab!=="all"?"（换个状态看看）":"，上面输入框记一条吧"}</div></td></tr>`;
  } else {
    tbody.innerHTML = rows.map(rowHTML).join("");
  }
  document.getElementById("meta").textContent =
    `${c.all} 条选题 · 更新 ${state.updated ? state.updated.replace("T"," ").slice(0,16) : "—"}`;
}

function rowHTML(t) {
  const pfClass = t.platform==="ins"?"ins":t.platform==="both"?"both":"";
  const scoreCells = SCORES.map(s => {
    const raw = t[s.key];               // null = 未打分
    const unscored = (raw == null);
    const v = raw || 0;
    const dots = [1,2,3,4,5].map(n =>
      `<span class="d ${n<=v?"on":""}" data-id="${t.id}" data-field="${s.key}" data-val="${n}"></span>`).join("");
    // 只有「流量」列才有 AI 评分（契合/变现 AI 不懂账号定位，不评）
    const isHeat = (s.key === "score_heat");
    const aiScored = isHeat && t.score_heat_source === "ai";
    const aiBtn = isHeat
      ? `<span class="ai-btn" data-ai="${t.id}" title="让 AI 评流量分（只评流量，结果需你确认）">🤖</span>` : "";
    // AI 打的分：分数旁挂"AI"角标 + hover 看理由，强区分手动分
    const aiBadge = aiScored
      ? `<span class="ai-badge" title="${esc(t.score_heat_reason || 'AI 评估')}">AI</span>` : "";
    const tip = unscored ? "还没打分，点圆点打 1-5 分" : (s.label + "：" + v + " 分" + (aiScored ? "（AI 建议，待你确认）" : ""));
    return `<td class="num">
        <div class="dots ${unscored?"unscored":""}" style="justify-content:center" title="${tip}">${dots}</div>
        <div class="score-sub">${unscored?'<span class="unscored-hint">未打分</span>':''}${aiBadge}${aiBtn}</div>
      </td>`;
  }).join("");
  const statusOpts = STATUS_OPTS.map(s =>
    `<option value="${s.key}" ${s.key===t.status?"selected":""}>${s.name}</option>`).join("");

  let main = `
    <tr data-id="${t.id}">
      <td class="col-title">
        <div class="c-title" data-edit-title="${t.id}" title="点击编辑标题">${esc(t.title)}</div>
        <div class="c-note ${t.note?"":"empty-note"}" data-edit-note="${t.id}" title="点击编辑角度">${t.note?esc(t.note):"+ 加一句角度"}</div>
        <div class="kw" data-kw="${t.id}" title="点击编辑 Google 搜索关键词（默认用标题，改成通用词能提高热度命中）">🔑 <span class="kw-lbl">Google 关键词</span> ${esc(t.keyword || t.title)}</div>
        ${t.status==="published"?`<div class="expand" data-toggle="${t.id}">${expanded.has(t.id)?"▲ 收起数据":"▼ 展开数据"}${t.published_at?` · 发布 ${t.published_at.slice(5,10)}`:""}</div>`:""}
      </td>
      <td><span class="pf ${pfClass}">${PF_LABEL[t.platform]||t.platform}</span></td>
      ${scoreCells}
      <td class="num"><span class="total">${totalDisplay(t)}</span></td>
      <td class="num">${extHeatCell(t)}</td>
      <td><select class="status-sel" data-id="${t.id}" data-action="status">${statusOpts}</select></td>
      <td class="act"><button class="del" data-id="${t.id}" title="删除">✕</button></td>
    </tr>`;

  if (t.status==="published" && expanded.has(t.id)) {
    const st = t.stats||{};
    main += `
      <tr class="stats-row" data-stats-for="${t.id}">
        <td colspan="9">
          <div class="stats-inner">
            <span class="lbl">📊 发布数据</span>
            ${STAT_DEFS.map(s => `
              <div class="stat-cell"><span class="k">${s.label}</span>
                <input type="number" inputmode="numeric" value="${st[s.key]==null?"":st[s.key]}"
                  data-id="${t.id}" data-stat="${s.key}" placeholder="—"></div>`).join("")}
          </div>
        </td>
      </tr>`;
  }
  return main;
}

// ---------- API ----------
async function api(method, path, body) {
  const opt = { method, headers: { "Content-Type": "application/json" } };
  if (body) opt.body = JSON.stringify(body);
  return (await fetch(path, opt)).json();
}
function toast(msg, ms=1500){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),ms); }

// 「+ 新选题」→ 打开右侧面板（新增模式），和编辑同一个面板，输入区大
document.getElementById("btnAdd").addEventListener("click", () => openPanel(null));

// 立即刷新外部热度
document.getElementById("btnRefreshHeat").addEventListener("click", async ()=>{
  const res = await api("POST","/refresh-heat",{});
  if (res.error) { toast("刷新失败："+res.error); return; }
  toast("已开始抓取，约半分钟后回填（抓不到的会留空）");
  // 30秒后自动刷新看结果
  setTimeout(load, 30000);
});

// tabs
document.getElementById("tabs").addEventListener("click", e=>{
  const tab = e.target.closest(".tab"); if(!tab) return;
  curTab = tab.dataset.tab; render();
});
// 平台筛选
document.querySelectorAll(".chip[data-pf]").forEach(chip=>{
  chip.addEventListener("click", ()=>{
    document.querySelectorAll(".chip[data-pf]").forEach(c=>c.classList.remove("on"));
    chip.classList.add("on"); filterPf=chip.dataset.pf; render();
  });
});
// 排序（列头）
document.getElementById("thead").addEventListener("click", e=>{
  const th = e.target.closest("th[data-sort]"); if(!th) return;
  const k = th.dataset.sort;
  if (sortKey===k) sortDir*=-1; else { sortKey=k; sortDir = k==="title"?1:-1; }
  render();
});

// 表格交互：打分 / 删除 / 展开 / AI 评流量
document.getElementById("tbody").addEventListener("click", async e=>{
  const dot = e.target.closest(".d");
  if (dot) { await api("PATCH","/topics/"+dot.dataset.id,{[dot.dataset.field]:+dot.dataset.val}); await load(); return; }
  // 🤖 AI 评流量（同步，转圈 loading；结果是"AI 建议"待 Ocean 确认）
  const aiBtn = e.target.closest(".ai-btn");
  if (aiBtn) {
    if (aiBtn.classList.contains("loading")) return;  // 防重复点
    aiBtn.classList.add("loading"); aiBtn.textContent = "⟳";
    toast("🤖 AI 评流量中…", 60000);
    const res = await api("POST","/ai-score/"+aiBtn.dataset.ai,{});
    if (res.error) {
      const err = String(res.error);
      // 401/未登录/找不到 CLI → 友好指向"这台机 claude 没登录"
      const msg = (/401|authenticate|找不到 claude/.test(err))
        ? "🤖 这台机 claude CLI 未登录/未装，换登录过的机器再评" : ("AI 评分失败："+err.slice(0,50));
      toast(msg, 5000); aiBtn.classList.remove("loading"); aiBtn.textContent="🤖"; return;
    }
    toast(`🤖 流量 ${res.score} 分 · ${res.reason}（AI 建议，可手调）`, 5000);
    await load();
    return;
  }
  const del = e.target.closest(".del");
  if (del) { if(!confirm("删除这条选题？")) return; await api("DELETE","/topics/"+del.dataset.id); toast("已删除"); await load(); return; }
  const tog = e.target.closest(".expand");
  if (tog) { const id=tog.dataset.toggle; expanded.has(id)?expanded.delete(id):expanded.add(id); render(); return; }
  // 点 标题 / 角度 / 关键词 → 打开侧边编辑面板
  const ed = e.target.closest("[data-edit-title],[data-edit-note],.kw");
  if (ed) {
    const id = ed.dataset.editTitle || ed.dataset.editNote || ed.dataset.kw;
    if (id) openPanel(id);
    return;
  }
});
// 改状态 / 填数据
document.getElementById("tbody").addEventListener("change", async e=>{
  const sel = e.target.closest("select[data-action]");
  if (sel) { await api("PATCH","/topics/"+sel.dataset.id,{status:sel.value});
    if(sel.value==="published") expanded.add(sel.dataset.id);
    toast("状态已更新"); await load(); return; }
  const st = e.target.closest("input[data-stat]");
  if (st) { const v=st.value===""?null:Number(st.value);
    await api("PATCH","/topics/"+st.dataset.id,{stats:{[st.dataset.stat]:v}}); toast("数据已保存"); return; }
});

// ---------- 编辑面板 ----------
let editingId = null;
const panel = document.getElementById("panel");
const panelMask = document.getElementById("panelMask");

// openPanel(null) = 新增模式；openPanel(id) = 编辑模式。两种共用同一面板。
function openPanel(id) {
  const isNew = id == null;
  const t = isNew ? null : state.topics.find(x => x.id === id);
  if (!isNew && !t) return;
  editingId = id;
  document.getElementById("panelTitle").textContent = isNew ? "新选题" : "编辑选题";
  document.getElementById("pTitle").value = t ? (t.title || "") : "";
  document.getElementById("pNote").value = t ? (t.note || "") : "";
  document.getElementById("pPlatform").value = t ? (t.platform || "xhs") : "xhs";
  document.getElementById("pKeyword").value = t ? (t.keyword || "") : "";
  // 新增时隐藏「Google 关键词」（建好后再调，避免一上来就让人填高级项）
  document.getElementById("fldKeyword").style.display = isNew ? "none" : "";
  panel.classList.add("show");
  panelMask.classList.add("show");
  setTimeout(() => document.getElementById("pTitle").focus(), 60);
}
function closePanel() {
  panel.classList.remove("show");
  panelMask.classList.remove("show");
  editingId = null;
}
async function savePanel() {
  const title = document.getElementById("pTitle").value.trim();
  if (!title) { toast("标题不能为空"); return; }
  const note = document.getElementById("pNote").value.trim();
  const platform = document.getElementById("pPlatform").value;
  if (editingId == null) {
    // 新增
    const res = await api("POST", "/topics/add", {title, note, platform});
    if (res.error) { toast("出错：" + res.error); return; }
    closePanel();
    toast(res.existed ? "已存在同名选题" : "已添加 ✔");
    await load();
  } else {
    // 编辑
    const patch = {title, note, platform, keyword: document.getElementById("pKeyword").value.trim()};
    const res = await api("PATCH", "/topics/" + editingId, patch);
    if (res.error) { toast("保存失败：" + res.error); return; }
    closePanel();
    toast("已保存 ✔");
    await load();
  }
}
document.getElementById("panelClose").addEventListener("click", closePanel);
document.getElementById("panelCancel").addEventListener("click", closePanel);
document.getElementById("panelSave").addEventListener("click", savePanel);
panelMask.addEventListener("click", closePanel);
// Esc 关闭 / Cmd+Enter 保存（任意字段）
document.addEventListener("keydown", e => {
  if (!panel.classList.contains("show")) return;
  if (e.key === "Escape") closePanel();
  else if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) savePanel();
});
// 标题输入框里直接回车也保存（IME 合成中的回车=选词，不提交 —— 守护同顶栏旧逻辑）
document.getElementById("pTitle").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); savePanel(); }
});

// ---------- 检查更新（菜单栏「检查更新…」调用，git pull 拉远端最新代码）----------
async function checkUpdate(verbose = false) {
  if (verbose) toast("⏳ 检查更新中…");
  let data;
  try {
    const r = await fetch("/check-update", { method: "POST", headers: {"Content-Type":"application/json"}, body: "{}" });
    data = await r.json();
  } catch (e) { if (verbose) toast("❌ 检查失败：server 无响应"); return; }
  if (!data.ok) { if (verbose) toast("❌ " + String(data.error || "检查失败").slice(0,60)); return; }
  if (data.updated) {
    let msg = "🆕 " + (data.message || "已更新到最新");
    if (data.needs_restart) msg += "（退出重开 T 生效）";
    toast(msg, 6000);
  } else if (verbose) {
    toast("✅ 已是最新版本");
  }
}
window.checkUpdate = checkUpdate;  // 暴露给 desktop_app.py 的菜单回调 evaluate_js 调用

load();
setInterval(load, 8000);
</script>
